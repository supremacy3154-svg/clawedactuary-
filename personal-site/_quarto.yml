project:
  type: website
  output-dir: _site
  resources:
    - "images/**"
    - "_generated/**"
  render:
    - "*.qmd"
    - "posts/*.qmd"
    - "!post-template.qmd"

website:
  title: "Clawed Actuary"
  description: "龙虾精算师 · 车险与出行风险 · 精算随笔"
  site-url: https://clawedactuary.com.cn
  favicon: images/favicon-32.png
  image: https://clawedactuary.com.cn/images/og-share.png
  image-alt: "Q版圆头龙虾精算师 Clawed Actuary · 穿深蓝西装打红领带的可爱卡通龙虾"
  open-graph:
    image-width: 1200
    image-height: 1200
  twitter-card: true
  navbar:
    background: "#f8f5f0"
    foreground: "#1a1814"
    pinned: true
    left:
      - href: index.qmd
        text: 首页
      - href: blog.qmd
        text: 文章
      - href: index.qmd#about
        text: 关于
    right:
      - icon: rss
        href: blog.xml
        aria-label: RSS
  page-footer:
    left: "🦞 Clawed Actuary · 龙虾精算师"
    center: "个人站点 · 与任何机构无关"
    right:
      - text: 声明
        href: disclaimer.qmd
      - text: RSS
        href: blog.xml

format:
  html:
    theme:
      - cosmo
      - theme/clawed.scss
    include-in-header:
      - theme/clawed-header.html
    include-after-body:
      - theme/clawed-share.html
      - theme/clawed-post-nav.html
      - _generated/site-features.js
      - theme/clawed-features.html
    toc: false
    code-copy: true
    lang: zh
    grid:
      margin-width: "0px"
      body-width: "960px"
      gutter-width: "0px"
