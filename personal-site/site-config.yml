# 评论（Giscus · 基于 GitHub Discussions）
# 首次启用：在 GitHub 仓库 Settings → General → Features 打开 Discussions
# 然后访问 https://giscus.app/zh-CN 选择该仓库，把 repo_id / category_id 填到下面
comments:
  enabled: true
  giscus:
    repo: "supremacy3154-svg/clawedactuary-"
    repo_id: "R_kgDOSw4Rgw"
    category: "General"
    category_id: "DIC_kwDOSw4Rg84C_xrX"
    mapping: "pathname"
    lang: "zh-CN"
    theme: "https://clawedactuary.com.cn/theme/giscus-clawed.css"
    input_position: "bottom"

# 邮件订阅（任选一种 provider，填好对应字段即可）
subscribe:
  enabled: true
  provider: "buttondown" # buttondown | formspree | none
  buttondown_username: "clawedactuary"
  formspree_form_id: "" # 例如 xyzabc → action 为 https://formspree.io/f/xyzabc
  privacy_note: "仅发送本站更新，可随时退订。你的邮箱不会公开。"
  # 新文章发布后通过 Buttondown API 通知订阅者（构建时运行 notify_subscribers.py）
  # API Key 仅放在环境变量 BUTTONDOWN_API_KEY，不要写进此文件
  notify:
    enabled: true
    mode: "send" # send = 新文章 push 后自动发给订阅者；draft = 仅生成草稿
    subject_prefix: "" # 可选，如 "[龙虾精算师] "

# 文章页阅读量（Cloudflare Pages Functions + KV，见 DEPLOY-CLOUDFLARE.md）
pageviews:
  enabled: true
  api_path: "/api/pageview"

# 全站访问信标（可选；你已在 CF Web Analytics 看板有数据时可不开）
analytics:
  enabled: false
  provider: "cloudflare" # cloudflare | umami | none
  cloudflare_beacon_token: "" # Cloudflare 控制台 → 网站 → Web Analytics → 管理 → 复制 token
  umami_website_id: ""
  umami_script_src: "https://cloud.umami.is/script.js"
