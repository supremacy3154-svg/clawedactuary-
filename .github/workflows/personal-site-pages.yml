# 生产部署在 Cloudflare Pages（见 personal-site/DEPLOY-CLOUDFLARE.md）。
# 本 workflow 仅做 push 后的 Quarto 构建校验，不部署 GitHub Pages。

name: Build personal site (CI)

on:
  push:
    branches: [main]
    paths:
      - "personal-site/**"
      - ".github/workflows/personal-site-pages.yml"
  pull_request:
    paths:
      - "personal-site/**"
  workflow_dispatch:

concurrency:
  group: personal-site-ci
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.6.40

      - name: Sync posts and features
        working-directory: personal-site
        run: python3 scripts/sync_posts.py

      - name: Render site
        working-directory: personal-site
        run: quarto render

      - name: Verify output
        run: test -f personal-site/_site/index.html
